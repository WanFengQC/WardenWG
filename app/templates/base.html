<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WardenWG{% endblock %}</title>
  <style>
    :root {
      --bg: #f5efe2;
      --panel: rgba(255, 252, 246, 0.94);
      --ink: #1f2a22;
      --muted: #6b6f68;
      --line: rgba(31, 42, 34, 0.12);
      --accent: #0f766e;
      --accent-2: #c2410c;
      --ok: #166534;
      --warn: #b45309;
      --danger: #b91c1c;
      --shadow: 0 18px 55px rgba(44, 54, 43, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(194,65,12,0.12), transparent 28%),
        linear-gradient(135deg, #f8f3e8, #efe5d1 55%, #f8f3e8);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    .shell { max-width: 1280px; margin: 0 auto; padding: 32px 20px 56px; }
    .hero {
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      margin-bottom: 24px;
    }
    .hero h1 { margin: 0; font-size: 34px; }
    .hero p { margin: 8px 0 0; color: var(--muted); }
    .grid { display: grid; gap: 18px; }
    .grid.cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 22px;
    }
    .card-number { font-size: 28px; font-weight: 700; margin-top: 10px; }
    .muted { color: var(--muted); }
    .toolbar, .inline-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .toolbar form, .inline-actions form { margin: 0; }
    .button, button {
      border: 0; border-radius: 999px; padding: 10px 16px; cursor: pointer;
      background: var(--accent); color: white; font-weight: 600;
    }
    .button.alt, button.alt { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .button.warn, button.warn { background: var(--accent-2); }
    .button.danger, button.danger { background: var(--danger); }
    input, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 14px; background: rgba(255,255,255,0.85); color: var(--ink);
    }
    textarea { min-height: 92px; resize: vertical; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 14px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; }
    .status {
      display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
      background: rgba(22,101,52,0.12); color: var(--ok);
    }
    .status.off { background: rgba(185,28,28,0.12); color: var(--danger); }
    .mono { font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; word-break: break-all; }
    .split { display: grid; gap: 18px; grid-template-columns: 1.1fr 1.9fr; }
    .auth-wrap { max-width: 520px; margin: 8vh auto; }
    .notice { color: var(--danger); margin-top: 12px; }
    .links { display: grid; gap: 10px; }
    .link-box {
      display: block; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
    }
    @media (max-width: 900px) {
      .split { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: flex-start; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="shell">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
