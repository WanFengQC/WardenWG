{% extends "base.html" %}
{% block title %}用户前台登录{% endblock %}
{% block content %}
<div class="auth-wrap panel">
  <h1>用户前台</h1>
  <p class="muted">使用账号密码登录，查看订阅地址和流量信息。</p>
  <form method="post" action="/portal/login" class="grid">
    <label>
      <div>用户名</div>
      <input type="text" name="username" placeholder="输入用户名" required>
    </label>
    <label>
      <div>密码</div>
      <input type="password" name="password" placeholder="输入密码" required>
    </label>
    <button type="submit">进入前台</button>
  </form>
  {% if error %}
  <div class="notice">{{ error }}</div>
  {% endif %}
</div>
{% endblock %}
